<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSwitch Examples</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: #2f2f2f;
            background: #f6f3ee;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            max-width: 720px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 32px;
            line-height: 1.1;
        }

        p {
            margin: 0 0 28px;
            color: #68645e;
            line-height: 1.5;
        }

        nav {
            display: grid;
            gap: 10px;
        }

        a {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 18px;
            border: 1px solid #d7d0c5;
            border-radius: 8px;
            color: #2f2f2f;
            background: #fffdfa;
            text-decoration: none;
        }

        a:hover {
            border-color: #ed8c01;
        }

        span {
            color: #ed8c01;
        }
    </style>
</head>
<body>
    <main>
        <h1>Trackswitch.js - Examples</h1>
        <nav>
            <a href="/examples/default/">Default player <span>/examples/default/</span></a>
            <a href="/examples/sync/">Sync player <span>/examples/sync/</span></a>
            <a href="/examples/interactive_sync/">Interactive Sync <span>/examples/interactive_sync/</span></a>
        </nav>
    </main>
</body>
</html>
